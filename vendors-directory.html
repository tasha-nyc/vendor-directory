<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a1a;--soft:#555;--muted:#999;--paper:#faf8f4;--warm:#f2ede3;--accent:#c9622a;--al:#f5e6db;--border:#e0d8cc;--green:#2d6a4f;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}

/* ── LOGIN SCREEN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:white;border:1.5px solid var(--border);border-radius:20px;padding:2.5rem 2.5rem 2rem;width:100%;max-width:420px;display:flex;flex-direction:column;gap:1.5rem}
.login-logo{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--ink)}
.login-logo em{color:var(--accent);font-style:italic}
.login-sub{font-size:.9rem;color:var(--muted);line-height:1.5;margin-top:-.75rem}
.lf{display:flex;flex-direction:column;gap:.35rem}
.lf label{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.lf input{border:1.5px solid var(--border);border-radius:9px;padding:.65rem .9rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);outline:none;transition:border-color .2s}
.lf input:focus{border-color:var(--accent)}
.btn-login{background:var(--ink);color:white;border:none;border-radius:9px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:opacity .2s}
.btn-login:hover{opacity:.85}
.login-err{color:#dc2626;font-size:.82rem;display:none;text-align:center}
.login-footer{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.5}

/* ── APP ── */
#app{display:none}
header{background:var(--ink);color:var(--paper);padding:2.5rem 2rem 2rem;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(201,98,42,.18)}
header::after{content:'';position:absolute;bottom:-80px;left:30%;width:200px;height:200px;border-radius:50%;background:rgba(201,98,42,.10)}
.hi{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.h-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.02em;line-height:1.1}
header h1 em{color:var(--accent);font-style:italic}
header p{margin-top:.6rem;color:rgba(250,248,244,.6);font-size:.9rem;font-weight:300}
.header-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.h-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:.3rem .8rem;border-radius:20px;font-size:.78rem;color:rgba(250,248,244,.8)}
.btn-signout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:rgba(250,248,244,.8);padding:.3rem .8rem;border-radius:20px;font-size:.78rem;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-signout:hover{background:rgba(255,255,255,.2)}
.header-meta{display:flex;align-items:center;gap:.7rem;margin-top:1.25rem;flex-wrap:wrap}
.mp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:.3rem .8rem;border-radius:20px;font-size:.78rem;color:rgba(250,248,244,.8)}
.btn-add-h{background:var(--accent);border:none;color:white;padding:.3rem 1rem;border-radius:20px;font-size:.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:.35rem}
.btn-add-h:hover{opacity:.85}

.controls{max-width:1100px;margin:1.75rem auto;padding:0 2rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:220px;position:relative}
.sw input{width:100%;padding:.65rem 1rem .65rem 2.3rem;border:1.5px solid var(--border);border-radius:8px;background:white;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--accent)}
.si{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.fr{display:flex;gap:.4rem;flex-wrap:wrap}
.fb{padding:.35rem .82rem;border:1.5px solid var(--border);border-radius:20px;background:white;font-family:'DM Sans',sans-serif;font-size:.76rem;color:var(--soft);cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.active{background:var(--accent);border-color:var(--accent);color:white}
.cnt{font-size:.78rem;color:var(--muted);white-space:nowrap}

.grid{max-width:1100px;margin:0 auto 4rem;padding:0 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem}
.card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:1.15rem 1.3rem 1.05rem;display:flex;flex-direction:column;gap:.55rem;transition:box-shadow .2s,transform .2s;animation:fu .4s ease both}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-2px)}
.card.is-new{border-color:var(--accent);border-width:2px}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ct{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.cn{font-family:'DM Serif Display',serif;font-size:1.07rem;line-height:1.25;color:var(--ink)}
.bdg{font-size:.67rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:.2rem .55rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.cat-transportation{background:#dbeafe;color:#1a4a7a}.cat-it{background:#ede9fe;color:#5a2d8a}
.cat-printing{background:#fef9c3;color:#854f0b}.cat-swag{background:#fce7f3;color:#9d174d}
.cat-legal{background:#d1fae5;color:#064e3b}.cat-eventplanner{background:#fff3e0;color:#8b4513}
.cat-venue{background:#fce4ec;color:#880e4f}.cat-teambuilding{background:#e8f5e9;color:#1b5e20}
.cat-speaker{background:#e3f2fd;color:#0d47a1}.cat-entertainment{background:#f3e5f5;color:#4a148c}
.cat-fitness{background:#dcfce7;color:#166534}.cat-catering{background:#fef3c7;color:#92400e}
.cat-design{background:#eef2ff;color:#3730a3}.cat-recruiting{background:#fdf4ff;color:#7e22ce}
.cat-other{background:#f2ede3;color:#555}
.desc{font-size:.84rem;color:var(--soft);line-height:1.55;font-style:italic}
.meta{display:flex;flex-direction:column;gap:.3rem}
.mr{display:flex;align-items:flex-start;gap:.45rem;font-size:.8rem;color:var(--soft)}
.lb{color:var(--muted);font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;min-width:58px;padding-top:1px;flex-shrink:0}
.mr a{color:var(--accent);text-decoration:none}.mr a:hover{text-decoration:underline}
.footer{display:flex;flex-wrap:wrap;gap:.35rem;padding-top:.6rem;border-top:1px solid var(--border);align-items:center;justify-content:space-between}
.tags{display:flex;flex-wrap:wrap;gap:.28rem}
.tag{background:var(--warm);color:var(--soft);font-size:.67rem;padding:.17rem .45rem;border-radius:20px}
.by{font-size:.72rem;color:var(--muted)}.by span{color:var(--green);font-weight:500}
.card-actions{display:flex;gap:.45rem}
.btn-sm{border:1.5px solid var(--border);background:white;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.73rem;color:var(--soft);cursor:pointer;padding:.28rem .65rem;display:flex;align-items:center;gap:.28rem;transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-plus{border-color:#16a34a;color:#16a34a}
.btn-plus:hover{background:#f0fdf4;border-color:#16a34a}
.pc{background:#16a34a;color:white;border-radius:20px;padding:.03rem .38rem;font-size:.66rem;margin-left:.18rem}
.add-card-btn{background:white;border:1.5px dashed var(--border);border-radius:12px;padding:1.8rem 1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.45rem;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.88rem;transition:all .2s;animation:fu .4s ease both}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent)}
.add-card-btn svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.5}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted);grid-column:1/-1;font-style:italic;font-family:'DM Serif Display',serif;font-size:1.1rem}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:1.75rem;display:flex;flex-direction:column;gap:1.1rem;transform:translateY(20px);transition:transform .25s}
.overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink)}
.modal h2 em{color:var(--accent);font-style:italic}
.fg{display:flex;flex-direction:column;gap:.3rem}
.fg label{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:8px;padding:.58rem .82rem;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .2s;background:white;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:65px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.modal-footer{display:flex;gap:.7rem;justify-content:flex-end;padding-top:.5rem;border-top:1px solid var(--border)}
.btn-cancel{background:white;border:1.5px solid var(--border);border-radius:8px;padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--soft);cursor:pointer}
.btn-cancel:hover{border-color:var(--muted)}
.btn-save{background:var(--ink);border:none;border-radius:8px;padding:.5rem 1.3rem;font-family:'DM Sans',sans-serif;font-size:.88rem;color:white;cursor:pointer}
.btn-save:hover{opacity:.85}
@media(max-width:600px){header{padding:2rem 1.25rem}.controls,.grid{padding:0 1.25rem}.grid{grid-template-columns:1fr}.fg-row{grid-template-columns:1fr}}
</style>
</head>

<div id="login-screen">

</div>

<!-- ═══ APP ═══ -->
<div id="app">

      <button class="fb" onclick="setF('design',this)">🎨 Design</button>

</div>

<!-- ═══ EDIT/ADD MODAL ═══ -->
<div class="overlay" id="overlay" onclick="closeBg(event)">

            <option value="legal">⚖️ Legal</option>
            <option value="eventplanner">📋 Event Planner</option>
            <option value="venue">🏛️ Venue</option>
            <option value="teambuilding">🤝 Team Building</option>
            <option value="speaker">🎤 Speaker</option>
            <option value="entertainment">🎭 Entertainment</option>
            <option value="fitness">🧘 Fitness</option>
            <option value="catering">🍽️ Catering</option>

      <div class="fg-row">

      <div class="fg-row">

      </div>
      <div class="fg"><label>Tags (comma-separated)</label><input id="f-tags" type="text" placeholder="Catering, Office Events, Custom"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveVendor()">Save vendor</button>
    </div>
  </div>
</div>

async function getSettings(){
  try{const r=await window.storage.get(STORAGE_SETTINGS,true);return r?JSON.parse(r.value):{code:DEFAULT_CODE,members:[]};}
  catch{return{code:DEFAULT_CODE,members:[]};}
}

async function tryLogin(){
  const email=(document.getElementById('li-email').value||'').trim().toLowerCase();
  const code=(document.getElementById('li-code').value||'').trim();
  const err=document.getElementById('li-err');
  if(!email||!code){err.textContent='Please enter both email and code.';err.style.display='block';return;}
  const settings=await getSettings();
  const isAdmin=(email===ADMIN_EMAIL&&code===ADMIN_CODE);
  const members=settings.members||[];
  const memberMatch=members.find(m=>m.toLowerCase()===email);
  const codeOk=(code===settings.code);
  if(!isAdmin&&(!memberMatch||!codeOk)){
    err.textContent=!memberMatch?'Your email is not on the access list.':'Incorrect code. Please try again.';
    err.style.display='block';
    document.getElementById('li-code').value='';
    return;
  }
  currentUser=email;
  sessionStorage.setItem('dir-user',email);
  showApp();
}

function signOut(){
  sessionStorage.removeItem('dir-user');
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('li-email').value='';
  document.getElementById('li-code').value='';
  document.getElementById('li-err').style.display='none';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const name=currentUser.split('@')[0];
  document.getElementById('user-pill').textContent='👤 '+name;
  loadVendors();
}

async function loadVendors(){
  try{
    const r=await window.storage.get(STORAGE_VENDORS,true);
    if(r&&r.value){
      const stored=JSON.parse(r.value);
      const ov={};stored.forEach(v=>{ov[v.id]=v;});
      vendors=SEED.map(s=>ov[s.id]?{...s,...ov[s.id]}:{...s});
      stored.forEach(v=>{if(!v.id.startsWith('s')&&!vendors.find(x=>x.id===v.id))vendors.push(v);});
    }else{vendors=SEED.map(v=>({...v}));}
  }catch{vendors=SEED.map(v=>({...v}));}
  render();
  document.getElementById('tc').textContent=vendors.length+' vendors';
}

async function saveVendors(){
  try{await window.storage.set(STORAGE_VENDORS,JSON.stringify(vendors),true);}
  catch(e){console.error(e);}
}

function igHandle(url){return url.replace(/.*instagram\.com\//,'').replace(/\?.*/,'').replace(/\/$/,'');}

function cardHTML(v,i){
  const delay=Math.min(i*.035,.6).toFixed(2);
  const rows=[];
  if(v.phone)rows.push(`<div class="mr"><span class="lb">Phone</span><a href="tel:${v.phone.replace(/\s/g,'')}">${v.phone}</a></div>`);
  if(v.email)rows.push(`<div class="mr"><span class="lb">Email</span><a href="mailto:${v.email}">${v.email}</a></div>`);
  if(v.website)rows.push(`<div class="mr"><span class="lb">Website</span><a href="https://${v.website.replace(/^https?:\/\//,'')}" target="_blank">${v.website}</a></div>`);
  if(v.instagram)rows.push(`<div class="mr"><span class="lb">Instagram</span><a href="https://${v.instagram.replace(/^https?:\/\//,'')}" target="_blank">@${igHandle(v.instagram)}</a></div>`);
  if(v.area)rows.push(`<div class="mr"><span class="lb">Area</span>${v.area}</div>`);
  const tags=(v.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const pl=v.plusOnes>0?`<span class="pc">+${v.plusOnes}</span>`:'';
  const isNew=!v.id.startsWith('s')?' is-new':'';
  return `<div class="card${isNew}" style="animation-delay:${delay}s">
    <div class="ct"><div class="cn">${v.name}</div><span class="bdg cat-${v.cat}">${v.label}</span></div>
    ${v.desc?`<div class="desc">${v.desc}</div>`:''}
    ${rows.length?`<div class="meta">${rows.join('')}</div>`:''}
    <div class="footer"><div class="tags">${tags}</div>${v.by?`<div class="by">⭐ <span>${v.by}</span></div>`:''}</div>
    <div class="card-actions">
      <button class="btn-sm btn-plus" onclick="plusOne('${v.id}')">👍 +1${pl}</button>
      <button class="btn-sm" onclick="openEdit('${v.id}')">✏️ Edit</button>
    </div>
  </div>`;
}

function render(){
  const q=currentSearch.toLowerCase();
  const fil=vendors.filter(v=>{
    const mc=currentFilter==='all'||v.cat===currentFilter;
    const s=[v.name,v.label,v.desc||'',v.area||'',v.by||'',...(v.tags||[])].join(' ').toLowerCase();
    return mc&&(!q||s.includes(q));
  });
  document.getElementById('sc').textContent=`${fil.length} of ${vendors.length}`;
  document.getElementById('grid').innerHTML=fil.length
    ?fil.map((v,i)=>cardHTML(v,i)).join('')+
      `<button class="add-card-btn" onclick="openAdd()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Add a vendor
      </button>`
    :'<div class="empty">No vendors match your search.</div>';
}

function setF(cat,btn){currentFilter=cat;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function doFilter(){currentSearch=document.getElementById('search').value;render();}

async function plusOne(id){
  const v=vendors.find(x=>x.id===id);if(!v)return;
  v.plusOnes=(v.plusOnes||0)+1;
  await saveVendors();render();
}

function clearForm(){['f-name','f-label','f-desc','f-phone','f-email','f-web','f-ig','f-area','f-by','f-tags'].forEach(id=>{document.getElementById(id).value='';});document.getElementById('f-cat').value='eventplanner';}

function openAdd(){editingId=null;document.getElementById('mtitle').innerHTML='Add <em>Vendor</em>';clearForm();document.getElementById('overlay').classList.add('open');}
function openEdit(id){
  const v=vendors.find(x=>x.id===id);if(!v)return;
  editingId=id;
  document.getElementById('mtitle').innerHTML='Edit <em>Vendor</em>';
  document.getElementById('f-name').value=v.name||'';
  document.getElementById('f-cat').value=v.cat||'other';
  document.getElementById('f-label').value=v.label||'';
  document.getElementById('f-desc').value=v.desc||'';
  document.getElementById('f-phone').value=v.phone||'';
  document.getElementById('f-email').value=v.email||'';
  document.getElementById('f-web').value=v.website||'';
  document.getElementById('f-ig').value=v.instagram||'';
  document.getElementById('f-area').value=v.area||'';
  document.getElementById('f-by').value=v.by||'';
  document.getElementById('f-tags').value=(v.tags||[]).join(', ');
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');editingId=null;}
function closeBg(e){if(e.target===document.getElementById('overlay'))closeModal();}

async function saveVendor(){
  const name=document.getElementById('f-name').value.trim();if(!name){document.getElementById('f-name').focus();return;}
  const cat=document.getElementById('f-cat').value;
  const def={transportation:'Transportation',it:'IT Services',printing:'Printing',swag:'Swag & Gifts',legal:'Legal',eventplanner:'Event Planner',venue:'Venue',teambuilding:'Team Building',speaker:'Speaker',entertainment:'Entertainment',fitness:'Fitness',catering:'Catering',design:'Design',recruiting:'Recruiting',other:'Services'};
  const igRaw=document.getElementById('f-ig').value.trim().replace(/^@/,'');
  const raw={name,cat,label:document.getElementById('f-label').value.trim()||def[cat],desc:document.getElementById('f-desc').value.trim(),phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),website:document.getElementById('f-web').value.trim().replace(/^https?:\/\//,''),instagram:igRaw?(igRaw.includes('/')?igRaw:'instagram.com/'+igRaw):'',area:document.getElementById('f-area').value.trim(),by:document.getElementById('f-by').value.trim()||currentUser.split('@')[0],tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean)};
  Object.keys(raw).forEach(k=>{if(raw[k]===''||(Array.isArray(raw[k])&&!raw[k].length))delete raw[k];});
  if(editingId){const idx=vendors.findIndex(x=>x.id===editingId);if(idx>-1)vendors[idx]={...vendors[idx],...raw};}
  else{raw.id='u'+Date.now();raw.plusOnes=0;vendors.push(raw);document.getElementById('tc').textContent=vendors.length+' vendors';}
  await saveVendors();closeModal();render();
}

(async()=>{
  const saved=sessionStorage.getItem('dir-user');
  if(saved){
    const settings=await getSettings();
    const members=settings.members||[];
    if(saved===ADMIN_EMAIL||members.find(m=>m.toLowerCase()===saved.toLowerCase())){
      currentUser=saved;showApp();return;
    }
  }
  document.getElementById('li-email').focus();
})();
</script>
