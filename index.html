header{background:#f0f0f0;padding:2rem 2rem 1.75rem;border-bottom:1px solid var(--border)}

.controls{max-width:1100px;margin:1.5rem auto;padding:0 2rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:220px;position:relative}

.si{position:absolute;left:.72rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

.cnt{font-size:.77rem;color:var(--muted)}

}

async function getSettings(){
  try{
    const [codeRows,memberRows]=await Promise.all([
      sbGet('settings','key=eq.access_code&select=value'),
      sbGet('members','select=email'),
    ]);
    const code=(codeRows&&codeRows.length)?codeRows[0].value:'ops2026';
    const members=(memberRows||[]).map(m=>m.email.toLowerCase());
    return{code,members,loaded:true};
  }catch{return{code:'ops2026',members:[],loaded:false};}
}

async function tryLogin(){
  const email=(document.getElementById('li-email').value||'').trim().toLowerCase();
  const code=(document.getElementById('li-code').value||'').trim();
  const err=document.getElementById('li-err');
  if(!email){err.textContent='Please enter your email.';err.style.display='block';return;}
  if(!code){err.textContent='Please enter the access code.';err.style.display='block';return;}
  err.style.display='none';
  const isAdmin=(email===ADMIN_EMAIL&&code===ADMIN_CODE);
  if(isAdmin){currentUser=email;sessionStorage.setItem('dir-user',email);showApp();return;}
  const memberOk=ALLOWED_EMAILS.includes(email);
  const codeOk=(code==='ops2026');
  if(!memberOk){err.textContent='Your email is not on the access list.';err.style.display='block';return;}
  if(!codeOk){err.textContent='Incorrect code. Please try again.';err.style.display='block';document.getElementById('li-code').value='';return;}
  currentUser=email;sessionStorage.setItem('dir-user',email);showApp();
}


function signOut(){
  sessionStorage.removeItem('dir-user');
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('li-email').value='';
  document.getElementById('li-code').value='';
  document.getElementById('li-err').style.display='none';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const name=currentUser.split('@')[0];
  document.getElementById('user-pill').textContent='👤 '+name;
  // Only show admin controls for admin
  const isAdmin=currentUser===ADMIN_EMAIL;
  document.getElementById('add-vendor-btn').style.display=isAdmin?'flex':'none';
  loadVendors();
}

async function loadVendors(){
  // Always show SEED data immediately
  vendors=SEED.map(v=>({...v}));
  render();
  document.getElementById('tc').textContent=vendors.length+' vendors';
  // Then try to merge Google Sheet overrides in background (with timeout)
  try{
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),5000);
    const res=await fetch(GS_URL+'?t='+Date.now(),{signal:controller.signal});
    clearTimeout(timer);
    const rows=await res.json();
    if(Array.isArray(rows)&&rows.length){
      const ov={};
      // Get latest entry per ID (last write wins)
      rows.forEach(r=>{
        const id=r['ID']||r.id;
        if(!id)return;
        ov[id]={
          id,
          biz:r['Business Name']||r.biz||'',
          contact:r['Contact']||r.contact||'',
          cat:r['Category']||r.cat||'other',
          label:r['Label']||r.label||'',
          desc:r['Description']||r.desc||'',
          phone:r['Phone']||r.phone||'',
          email:r['Email']||r.email||'',
          website:r['Website']||r.website||'',
          instagram:r['Instagram']||r.instagram||'',
          area:r['Area']||r.area||'',
          by:r['Recommended By']||r.by||'',
          tags:(r['Tags']||'').split(',').map(t=>t.trim()).filter(Boolean),
          plusOnes:0
        };
      });
      vendors=SEED.map(s=>ov[s.id]?{...s,...ov[s.id]}:{...s});
      Object.values(ov).forEach(v=>{
        if(!v.id.startsWith('s')&&!vendors.find(x=>x.id===v.id))vendors.push(v);
      });
      render();
      document.getElementById('tc').textContent=vendors.length+' vendors';
    }
  }catch(e){console.log('Sheet load skipped:',e.message);}
}

async function saveVendors(v){
  try{
    await fetch(GS_URL,{
      method:'POST',
      body:JSON.stringify({...v,action:'edit',submittedBy:currentUser}),
    });
  }catch(e){console.error('Sheet save error:',e);}
}

function igH(url){return url.replace(/.*instagram\.com\//,'').replace(/\?.*/,'').replace(/\/$/,'');}

function cardHTML(v,i){
  const delay=Math.min(i*.033,.6).toFixed(2);
  const rows=[];
  if(v.phone)rows.push(`<div class="mr"><span class="lb">Phone</span><a href="tel:${v.phone.replace(/\s/g,'')}">${v.phone}</a></div>`);
  if(v.email)rows.push(`<div class="mr"><span class="lb">Email</span><a href="mailto:${v.email}">${v.email}</a></div>`);
  if(v.website)rows.push(`<div class="mr"><span class="lb">Website</span><a href="https://${v.website.replace(/^https?:\/\//,'')}" target="_blank">${v.website}</a></div>`);
  if(v.instagram)rows.push(`<div class="mr"><span class="lb">Instagram</span><a href="https://${v.instagram.replace(/^https?:\/\//,'')}" target="_blank">@${igH(v.instagram)}</a></div>`);
  if(v.area)rows.push(`<div class="mr"><span class="lb">Area</span>${v.area}</div>`);
  const tags=(v.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const pl=v.plusOnes>0?`<span class="pc">+${v.plusOnes}</span>`:'';
  const isNew=!v.id.startsWith('s')?' is-new':'';
  const bizName=v.biz||v.name||'';
  const contactLine=v.contact?`<div class="contact-name">${v.contact}</div>`:'';
  return `<div class="card${isNew}" style="animation-delay:${delay}s">
    <div class="card-top">
      <div class="card-names">
        <div class="biz-name">${bizName}</div>
        ${contactLine}
      </div>
      <span class="bdg cat-${v.cat}">${v.label}</span>
    </div>
    ${v.desc?`<div class="desc">${v.desc}</div>`:''}
    ${rows.length?`<div class="meta">${rows.join('')}</div>`:''}
    <div class="footer">
      <div class="tags">${tags}</div>
      ${v.by?`<div class="rec-by">⭐ <span>${v.by}</span></div>`:''}
    </div>
    <div class="card-actions">
      <button class="btn-sm btn-plus" onclick="plusOne('${v.id}')" style="${hasVoted(v.id)?'opacity:.45;cursor:not-allowed':''}">👍 +1${pl}</button>
      <button class="btn-sm" onclick="openEdit('${v.id}')">✏️ Edit</button>
    </div>
  </div>`;
}

function hasVoted(id){
  if(!currentUser)return false;
  const voted=JSON.parse(localStorage.getItem('voted')||'{}');
  return !!voted[currentUser+'_'+id];
}

function render(){
  const q=currentSearch.toLowerCase();
  const fil=vendors.filter(v=>{
    const mc=currentFilter==='all'||v.cat===currentFilter;
    const s=[v.biz||v.name||'',v.contact||'',v.label,v.desc||'',v.area||'',v.by||'',...(v.tags||[])].join(' ').toLowerCase();
    return mc&&(!q||s.includes(q));
  });
  document.getElementById('sc').textContent=`${fil.length} of ${vendors.length}`;
  document.getElementById('grid').innerHTML=fil.length
    ?fil.map((v,i)=>cardHTML(v,i)).join('')+`<button class="add-card-btn" onclick="openAdd()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add a vendor</button>`
    :'<div class="empty">No vendors match your search.</div>';
}

function setF(cat,btn){currentFilter=cat;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function doFilter(){currentSearch=document.getElementById('search').value;render();}

async function plusOne(id){
  const v=vendors.find(x=>x.id===id);if(!v)return;
  const voted=JSON.parse(localStorage.getItem('voted')||'{}');
  const key=currentUser+'_'+id;
  if(voted[key]){showToast("You already +1'd this vendor!");return;}
  v.plusOnes=(v.plusOnes||0)+1;
  voted[key]=true;
  localStorage.setItem('voted',JSON.stringify(voted));
  await saveVendors(v);render();
}

function showToast(msg){
  let t=document.getElementById('toast-msg');
  if(!t){t=document.createElement('div');t.id='toast-msg';t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#000;color:white;padding:.6rem 1.25rem;border-radius:20px;font-size:.82rem;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;font-family:Inter,sans-serif';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},2500);
}

function clearForm(){
  ['f-biz','f-contact','f-label','f-desc','f-phone','f-email','f-web','f-ig','f-area','f-by','f-tags'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-cat').value='eventplanner';
}

function openAdd(){editingId=null;document.getElementById('mtitle').innerHTML='Add <em>Vendor</em>';clearForm();document.getElementById('overlay').classList.add('open');}
function openEdit(id){
  const v=vendors.find(x=>x.id===id);if(!v)return;
  editingId=id;
  document.getElementById('mtitle').innerHTML='Edit <em>Vendor</em>';
  document.getElementById('f-biz').value=v.biz||v.name||'';
  document.getElementById('f-contact').value=v.contact||'';
  document.getElementById('f-cat').value=v.cat||'other';
  document.getElementById('f-label').value=v.label||'';
  document.getElementById('f-desc').value=v.desc||'';
  document.getElementById('f-phone').value=v.phone||'';
  document.getElementById('f-email').value=v.email||'';
  document.getElementById('f-web').value=v.website||'';
  document.getElementById('f-ig').value=v.instagram||'';
  document.getElementById('f-area').value=v.area||'';
  document.getElementById('f-by').value=v.by||'';
  document.getElementById('f-tags').value=(v.tags||[]).join(', ');
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');editingId=null;}
function closeBg(e){if(e.target===document.getElementById('overlay'))closeModal();}

async function saveVendor(){
  const biz=document.getElementById('f-biz').value.trim();if(!biz){document.getElementById('f-biz').focus();return;}
  const cat=document.getElementById('f-cat').value;
  const def={transportation:'Transportation',it:'IT Services',printing:'Printing',swag:'Swag & Gifts',legal:'Legal',eventplanner:'Event Planner',venue:'Venue',teambuilding:'Team Building',speaker:'Speaker',entertainment:'Entertainment',fitness:'Fitness',catering:'Catering',design:'Design',recruiting:'Recruiting',other:'Services'};
  const igRaw=document.getElementById('f-ig').value.trim().replace(/^@/,'');
  const raw={biz,contact:document.getElementById('f-contact').value.trim(),cat,label:document.getElementById('f-label').value.trim()||def[cat],desc:document.getElementById('f-desc').value.trim(),phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),website:document.getElementById('f-web').value.trim().replace(/^https?:\/\//,''),instagram:igRaw?(igRaw.includes('/')?igRaw:'instagram.com/'+igRaw):'',area:document.getElementById('f-area').value.trim(),by:document.getElementById('f-by').value.trim()||currentUser.split('@')[0],tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean)};
  Object.keys(raw).forEach(k=>{if(raw[k]===''||(Array.isArray(raw[k])&&!raw[k].length))delete raw[k];});
  if(editingId){const idx=vendors.findIndex(x=>x.id===editingId);if(idx>-1){vendors[idx]={...vendors[idx],...raw};await saveVendors(vendors[idx]);}}
  else{raw.id='u'+Date.now();raw.plusOnes=0;vendors.push(raw);await saveVendors(raw);document.getElementById('tc').textContent=vendors.length+' vendors';}
  closeModal();render();
}

(async()=>{
  const saved=sessionStorage.getItem('dir-user');
  if(saved){currentUser=saved;showApp();return;}
  document.getElementById('li-email').focus();
})();
</script>
